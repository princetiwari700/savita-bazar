<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Savita BaZar</title>

<style>
body { margin:0; font-family: Arial; background:#111; color:white; }
header { background:#c00000; padding:15px; text-align:center; }
h1 { margin:0; font-weight:bold; font-style:italic; }
.search { width:90%; margin:10px auto; display:block; padding:10px; border-radius:8px; border:none; }
.container { padding:10px; display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; }
.card { background:#1c1c1c; padding:10px; border-radius:10px; text-align:center; }
.card img { width:100%; height:100px; object-fit:cover; cursor:pointer; }
button { background:#c00000; color:white; border:none; padding:6px; width:100%; margin-top:5px; border-radius:5px; }
.qty { display:flex; justify-content:center; gap:5px; }
.cart { position:fixed; bottom:0; width:100%; background:#000; padding:10px; }
.cart-popup { position:fixed; bottom:-100%; width:100%; background:#111; padding:15px; transition:0.3s; }
.cart-popup.active { bottom:0; }
form { padding:10px; margin-bottom:120px; }
input, textarea { width:100%; margin:5px 0; padding:8px; }
.popup { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; }
.popup img { width:80%; }
.success { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:green; padding:10px; display:none; }
</style>
</head>
<body>

<header>
<h1><b><i>Savita BaZar</i></b></h1>
<p><i>order anything easily..!</i></p>
</header>

<input type="text" class="search" placeholder="Search..." onkeyup="searchProduct(this.value)">

<div class="container" id="products"></div>

<div class="cart">
<button onclick="toggleCart()">View Cart</button>
</div>

<div class="cart-popup" id="cartPopup">
<h3>Cart</h3>
<p id="items"></p>
<p>Total: ₹<span id="total"></span></p>
<button onclick="orderNow()">Order on WhatsApp</button>
<button onclick="toggleCart()">Close</button>
</div>

<form onsubmit="return submitForm()">
<h3>Place Order</h3>
<input type="text" id="name" placeholder="Name" required>
<input type="text" id="phone" placeholder="Phone" required>
<textarea id="orderBox"></textarea>
<button type="submit">Submit</button>
</form>

<div class="popup" id="imgPopup" onclick="closeImg()">
<img id="popupImg">
</div>

<div class="success" id="successMsg">Order Placed!</div>

<script>
let products=[
{name:"Dairy Milk",price:50,img:"https://i.ibb.co/3YsLf372/Screenshot-2026-03-20-144615.png"},
{name:"Amul Cow Milk",price:32,img:"https://i.ibb.co/bgdX39rS/Screenshot-2026-03-20-144810.png"},
{name:"Chips",price:22,img:"https://i.ibb.co/tp2ZVRD1/Screenshot-2026-03-20-144918.png"}
];
let cart={};

function display(list){
let html="";
list.forEach(p=>{
html+=`<div class="card">
<img src="${p.img}" onclick="showImg('${p.img}')">
<h4>${p.name}</h4>
<p>₹${p.price}</p>
<div class="qty">
<button onclick="changeQty('${p.name}',-1)">-</button>
<button onclick="changeQty('${p.name}',1)">+</button>
</div>
</div>`;
});
document.getElementById("products").innerHTML=html;
}
display(products);

function changeQty(name,val){
if(!cart[name]) cart[name]={qty:0,price:products.find(p=>p.name===name).price};
cart[name].qty+=val;
if(cart[name].qty<=0) delete cart[name];
updateCart();
}

function updateCart(){
let text="";let total=0;
for(let i in cart){text+=i+" x"+cart[i].qty+", "; total+=cart[i].qty*cart[i].price;}
document.getElementById("items").innerText=text;
document.getElementById("total").innerText=total;
document.getElementById("orderBox").value=text+" Total:"+total;
}

function toggleCart(){document.getElementById("cartPopup").classList.toggle("active");}

function orderNow(){
let msg=document.getElementById("orderBox").value;
window.open("https://wa.me/919625785847?text="+encodeURIComponent(msg));
}

function searchProduct(val){
let f=products.filter(p=>p.name.toLowerCase().includes(val.toLowerCase()));
display(f);
}

function showImg(src){document.getElementById("imgPopup").style.display="flex";document.getElementById("popupImg").src=src;}
function closeImg(){document.getElementById("imgPopup").style.display="none";}

function submitForm(){
document.getElementById("successMsg").style.display="block";
setTimeout(()=>{document.getElementById("successMsg").style.display="none";},2000);
return false;
}
</script>

</body>
</html>
